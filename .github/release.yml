changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking-change
    - title: "✨ New Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "📚 Documentation"
      labels:
        - documentation
    - title: "🔧 Maintenance"
      labels:
        - maintenance
        - dependencies
        - chore
    - title: "Other Changes"
      labels:
        - "*"
