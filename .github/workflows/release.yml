name: Release

on:
  release:
    types: [published]

env:
  NODE_VERSION: "24"

jobs:
  release:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          if [[ ! "${{ github.event.release.tag_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Release tag must follow semver format (e.g., v1.2.3)"
            exit 1
          fi

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump version in package.json
        run: |
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.version.outputs.version }}"/' package.json

      - name: Bump version in consts.ts
        run: |
          sed -i 's/CARD_VERSION = "[^"]*"/CARD_VERSION = "${{ steps.version.outputs.version }}"/' src/consts.ts

      - name: Verify versions match
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CONST_VERSION=$(grep -oP 'CARD_VERSION = "\K[^"]+' src/consts.ts)
          TAG_VERSION="${{ steps.version.outputs.version }}"

          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "Error: package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi

          if [[ "$CONST_VERSION" != "$TAG_VERSION" ]]; then
            echo "Error: consts.ts version ($CONST_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi

          echo "All versions match: $TAG_VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/calculator-card.js
